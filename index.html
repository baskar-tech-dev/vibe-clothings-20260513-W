<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Vibe Clothing Company</title>
  <link rel="shortcut icon" href="/asset/logo-black.png" type="image/x-icon">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Design System & Offline Styles */
    :root {
      --primary: #eab308; /* vibrant yellow/gold matching the mockup */
      --primary-dark: #ca8a04;
      --primary-glow: rgba(234, 179, 8, 0.25);
      
      --bg-light: #f6f4ee;
      --bg-dark: #ebe7df;
      
      --text-main: #1f2937;
      --text-muted: #4b5563;
      
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-serif: 'Cormorant Garamond', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-body);
      background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 2rem;
    }
    
    .offline-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 3rem;
      align-items: center;
      justify-content: space-between;
    }
    
    @media (min-width: 1024px) {
      .offline-container {
        flex-direction: row;
        gap: 2rem;
      }
      .content-side {
        width: 80%;
        text-align: left;
        align-items: flex-start;
      }
      .visual-side {
        width: 55%;
      }
    }
    
    /* Content Column */
    .content-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }
    
    @media (max-width: 1023px) {
      .content-side {
        max-width: 600px;
        margin-top: 1rem;
      }
    }
    
    .demo-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    
    .badge-text {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #6b7280;
    }
    
    .badge-line {
      display: inline-block;
      width: 25px;
      height: 2px;
      background-color: var(--primary);
    }
    
    .main-title {
      font-family: var(--font-body);
      font-size: clamp(2.4rem, 4.5vw, 4.2rem);
      font-weight: 800;
      line-height: 1.15;
      color: #111827;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
    
    .title-highlight {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 600;
      color: var(--primary);
      position: relative;
      display: inline-block;
      margin-left: 2px;
      font-size: 1.05em;
    }
    
    .divider-line {
      width: 40px;
      height: 2px;
      background-color: #2c2c2c;
      margin-bottom: 2.2rem;
    }
    
    .description {
      font-family: var(--font-body);
      font-size: clamp(0.95rem, 1.4vw, 1.1rem);
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      font-weight: 400;
    }
    
    .btn-support {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background-color: #0c0a09; /* Dark Charcoal */
      color: #ffffff;
      text-decoration: none;
      padding: 1.05rem 2rem;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255,255,255,0.05);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, background-color 0.3s ease;
      position: relative;
    }
    
    .btn-support::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--primary), transparent);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-support:hover {
      transform: translateY(-3px);
      background-color: #1c1917;
      box-shadow: 0 15px 35px var(--primary-glow), 0 5px 15px rgba(0,0,0,0.15);
    }
    
    .btn-support:hover::after {
      opacity: 0.3;
    }

    .btn-support:active {
      transform: translateY(-1px);
    }
    
    .icon-speech {
      width: 18px;
      height: 18px;
      color: var(--primary);
      transition: transform 0.3s ease;
    }
    
    .btn-support:hover .icon-speech {
      transform: scale(1.1);
    }
    
    .icon-arrow {
      width: 14px;
      height: 14px;
      transition: transform 0.3s ease;
    }
    
    .btn-support:hover .icon-arrow {
      transform: translate(3px, -3px);
    }
    
    /* WhatsApp Button Styles & Grouping */
    .actions-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      width: 100%;
      margin-top: 0.5rem;
    }
    
    @media (min-width: 1024px) {
      .actions-group {
        justify-content: flex-start;
      }
    }
    
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      color: #ffffff;
      text-decoration: none;
      padding: 1.05rem 2rem;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(37, 211, 102, 0.15), 0 0 0 1px rgba(255,255,255,0.05);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
      position: relative;
    }
    
    .btn-whatsapp:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(37, 211, 102, 0.3), 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .btn-whatsapp:active {
      transform: translateY(-1px);
    }
    
    .icon-whatsapp {
      width: 18px;
      height: 18px;
      color: #ffffff;
      transition: transform 0.3s ease;
    }
    
    .btn-whatsapp:hover .icon-whatsapp {
      transform: scale(1.1) rotate(6deg);
    }
    
    /* Visual/Scene Column */
    .visual-side {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: auto;
      min-height: 480px;
      position: relative;
      overflow: hidden;
    }
    
    .scene-container {
      position: relative;
      width: 480px;
      height: 480px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* Background Circle Disk */
    .bg-disk {
      position: absolute;
      width: 380px;
      height: 380px;
      background: linear-gradient(135deg, #f3ede2, #e3dfd3);
      border-radius: 50%;
      z-index: 1;
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.7), 0 8px 30px rgba(0,0,0,0.03);
      top: 15px;
    }
    
    /* Pedestal cylinders */
    .pedestal {
      position: absolute;
      bottom: 25px;
      width: 390px;
      height: 70px;
      z-index: 3;
    }
    
    .pedestal-top {
      width: 100%;
      height: 45px;
      background: #e2ddd3;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: inset 0 2px 6px rgba(255,255,255,0.7), 0 3px 5px rgba(0,0,0,0.03);
      position: relative;
      z-index: 4;
    }
    
    .pedestal-body {
      width: 100%;
      height: 38px;
      background: linear-gradient(90deg, #cfc8bb, #e2ddd3 20%, #ebe7de 50%, #dcd7ca 80%, #c8c0b2);
      margin-top: -22px;
      border-radius: 0 0 195px 195px / 0 0 22px 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 3;
    }
    
    /* Suspension Peg and Strings */
    .hanger-system {
      position: absolute;
      top: 5px;
      width: 320px;
      height: 360px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: 50% 25px;
      animation: signSwing 6s ease-in-out infinite alternate;
    }
    
    .peg {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 35% 35%, #555, #111);
      border-radius: 50%;
      box-shadow: 0 3px 5px rgba(0,0,0,0.3);
      position: relative;
      z-index: 10;
    }
    
    .peg::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #777;
      border-radius: 50%;
      top: 5px;
      left: 5px;
    }
    
    .string {
      position: absolute;
      top: 9px;
      width: 1.5px;
      height: 125px;
      background: linear-gradient(to bottom, #111, #444);
      z-index: 4;
      transform-origin: top center;
    }
    
    .string-left {
      left: 50%;
      transform: rotate(-38.5deg);
    }
    
    .string-right {
      right: 50%;
      transform: rotate(38.5deg);
    }
    
    /* The Board itself */
    .hanging-board {
      margin-top: 96px;
      width: 256px;
      height: 184px;
      background-color: #141414; /* Charcoal Black */
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ffffff;
      position: relative;
    }
    
    /* Hanging Board Screws/Holes */
    .hanging-board::before,
    .hanging-board::after {
      content: '';
      position: absolute;
      top: 14px;
      width: 8px;
      height: 8px;
      background: #09090b;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
    }
    
    .hanging-board::before { left: 45px; }
    .hanging-board::after { right: 45px; }
    
    .lock-container {
      width: 48px;
      height: 48px;
      background-color: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .lock-icon {
      width: 26px;
      height: 26px;
      animation: pulseGlow 3s ease-in-out infinite;
    }
    
    .board-text {
      font-family: var(--font-heading);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.5;
      margin-bottom: 0.6rem;
      color: #ffffff;
      padding: 0 4px;
    }
    
    .board-subtext {
      font-family: var(--font-body);
      font-size: 0.62rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.02em;
    }
    
    /* Vase & Plant (Bottom Right) */
    .vase-container {
      position: absolute;
      bottom: 45px;
      right: 30px;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .vase {
      width: 74px;
      height: 74px;
      background: radial-gradient(circle at 35% 35%, #f6f4f0, #e2ddd3 50%, #cbbfae);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08), inset -3px -3px 8px rgba(0,0,0,0.06), inset 3px 3px 8px rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.5);
    }
    
    .vase-neck {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 26px;
      height: 10px;
      background: linear-gradient(90deg, #d3ccc0, #e2ddd3, #cbbfae);
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .plant-leaves {
      width: 110px;
      height: 110px;
      margin-bottom: -20px;
      z-index: 5;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.12));
      transform: rotate(6deg);
    }
    
    /* Floating Spheres */
    .floating-sphere {
      position: absolute;
      border-radius: 50%;
      z-index: 8;
    }
    
    .sphere-large {
      width: 36px;
      height: 36px;
      background: radial-gradient(circle at 30% 30%, #444, #1c1c1c 45%, #050505);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      bottom: 130px;
      left: 70px;
      animation: elementBob 4.5s ease-in-out infinite alternate;
    }
    
    .sphere-small {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 30% 30%, #3a3a3a, #1a1a1a 45%, #000);
      box-shadow: 0 6px 12px rgba(0,0,0,0.22);
      bottom: 70px;
      left: 115px;
      animation: elementBob-reverse 3.8s ease-in-out infinite alternate;
    }
    
    /* 3D Rotating Yellow Cube */
    .cube-container {
      position: absolute;
      top: 150px;
      right: 70px;
      width: 32px;
      height: 32px;
      perspective: 400px;
      z-index: 8;
    }
    
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: cubeRotate 14s linear infinite;
    }
    
    .cube-face {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 6px rgba(255,255,255,0.2);
    }
    
    .cube-front  { transform: rotateY(0deg) translateZ(11px); background: #eab308; }
    .cube-back   { transform: rotateY(180deg) translateZ(11px); background: #ca8a04; }
    .cube-top    { transform: rotateX(90deg) translateZ(11px); background: #fef08a; }
    .cube-bottom { transform: rotateX(-90deg) translateZ(11px); background: #854d0e; }
    .cube-left   { transform: rotateY(-90deg) translateZ(11px); background: #ca8a04; }
    .cube-right  { transform: rotateY(90deg) translateZ(11px); background: #eab308; }
    
    /* Animations */
    @keyframes signSwing {
      0% { transform: rotate(-2.5deg); }
      100% { transform: rotate(2.5deg); }
    }
    
    @keyframes elementBob {
      0% { transform: translateY(0); }
      100% { transform: translateY(-14px); }
    }
    
    @keyframes elementBob-reverse {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }
    
    @keyframes cubeRotate {
      0% { transform: rotateX(15deg) rotateY(0deg) translateY(0px); }
      50% { transform: rotateX(195deg) rotateY(180deg) translateY(-6px); }
      100% { transform: rotateX(375deg) rotateY(360deg) translateY(0px); }
    }
    
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(234, 179, 8, 0.4)); opacity: 0.95; }
      50% { filter: drop-shadow(0 0 8px rgba(234, 179, 8, 0.7)); opacity: 1; }
    }
    
    /* Responsive layout tweaks */
    @media (max-width: 1023px) {
      .offline-container {
        gap: 2rem;
      }
      .visual-side {
        min-height: 440px;
      }
    }
    
    @media (max-width: 640px) {
      body {
        padding: 2rem 1.5rem;
        overflow-x: hidden;
      }
      .offline-container {
        gap: 1.5rem;
      }
      .main-title {
        font-size: clamp(2rem, 8vw, 2.6rem);
        line-height: 1.2;
        margin-bottom: 1rem;
      }
      .description {
        font-size: 0.95rem;
        margin-bottom: 2rem;
      }
      .actions-group {
        flex-direction: column;
        width: 100%;
      }
      .btn-support, .btn-whatsapp {
        width: 100%;
        justify-content: center;
        padding: 1rem 1.75rem;
      }
      .visual-side {
        min-height: 320px;
      }
      .scene-container {
        transform: scale(0.7);
        margin: 0;
        flex-shrink: 0;
      }
    }
    
    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }
      .visual-side {
        min-height: 280px;
      }
      .scene-container {
        transform: scale(0.6);
      }
      .main-title {
        font-size: 1.95rem;
      }
    }
    
    @media (max-width: 380px) {
      .visual-side {
        min-height: 230px;
      }
      .scene-container {
        transform: scale(0.5);
      }
      .main-title {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <!-- Left Column: Content -->
    <div class="content-side">
      <div class="demo-badge">
        <span class="badge-text">DEMO PROJECT</span>
        <span class="badge-line"></span>
      </div>
      
      <h1 class="main-title">
        This Experience<br>
        Is Currently<br>
        <span class="title-highlight">Offline.</span>
      </h1>
      
      <div class="divider-line"></div>
      
      <p class="description">
        This demo project is temporarily unavailable.<br>
        For support or project inquiries,<br>
        please contact Future Mind Studio.
      </p>
      
      <div class="actions-group">
        <a href="mailto:hello.futuremindstudio@gmail.com" class="btn-support">
          <svg class="icon-speech" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
          </svg>
          <span>Contact Support</span>
          <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </a>
        
        <a href="https://wa.me/919894389653?text=Hi%20Future%20Mind%20Studio,%20I'm%20inquiring%20about%20the%20demo%20project." target="_blank" rel="noopener noreferrer" class="btn-whatsapp">
          <svg class="icon-whatsapp" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.004 2C6.48 2 2 6.48 2 12.004c0 1.76.46 3.42 1.26 4.88L2 22l5.3-1.28c1.4.76 3 1.28 4.7 1.28 5.52 0 10-4.48 10-10.004C22.004 6.48 17.52 2 12.004 2zm5.72 14.1c-.24.68-1.2 1.24-1.92 1.32-.48.06-1.1.08-3.22-.8-2.72-1.12-4.48-3.88-4.62-4.06-.14-.18-1.12-1.48-1.12-2.82 0-1.34.7-2 .98-2.28.28-.28.6-.36.8-.36h.58c.18 0 .42-.02.66.52.26.58.86 2.1.94 2.26.08.16.14.36.02.58-.12.22-.18.36-.36.56-.18.2-.38.46-.54.62-.18.18-.36.38-.16.74.2.36.88 1.46 1.88 2.36 1.3 1.16 2.4 1.52 2.74 1.7.34.18.54.16.74-.06.2-.22.86-.98 1.08-1.32.22-.34.44-.28.74-.16.3.12 1.9.9 2.24 1.06.34.16.56.24.64.38.08.14.08.8-.16 1.48z"/>
          </svg>
          <span>WhatsApp Connect</span>
        </a>
      </div>
    </div>
    
    <!-- Right Column: Interactive 3D Visual -->
    <div class="visual-side">
      <div class="scene-container">
        <!-- Background Disk -->
        <div class="bg-disk"></div>
        
        <!-- Hanging Hanger and Sign Board -->
        <div class="hanger-system">
          <div class="peg"></div>
          <div class="string string-left"></div>
          <div class="string string-right"></div>
          
          <!-- Board -->
          <div class="hanging-board">
            <div class="lock-container">
              <!-- Golden Lock Icon -->
              <svg class="lock-icon" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="11" width="14" height="10" rx="2.5" fill="none" stroke="var(--primary)" stroke-width="2"/>
                <path d="M12 14v3" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 11V7.5a4 4 0 0 1 8 0V11" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="15.5" r="1.2" fill="var(--primary)"/>
              </svg>
            </div>
            
            <h2 class="board-text">ACCESS TO THIS EXPERIENCE IS CURRENTLY UNAVAILABLE</h2>
            <p class="board-subtext">Thank you for understanding.</p>
          </div>
        </div>
        
        <!-- Pedestal Base -->
        <div class="pedestal">
          <div class="pedestal-top"></div>
          <div class="pedestal-body"></div>
        </div>
        
        <!-- Vase & Tropical Leaves -->
        <div class="vase-container">
          <svg class="plant-leaves" viewBox="0 0 120 120">
            <!-- Sleek Dark Monstera/Tropical Leaves with high contrast -->
            <path d="M60 110 Q25 80 15 40 Q40 25 60 110" fill="#2d372e" />
            <path d="M60 110 Q35 65 30 48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" fill="none" />
